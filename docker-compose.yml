

services:
  # MongoDB service
  mongodb:
    image: mongo:6.0
    container_name: quizzy-gen-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-quizzy_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-quizzy_password}
    networks:
      - quizzy-net

  # Backend service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quizzy-gen-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-quizzy_admin}:${MONGO_PASSWORD:-quizzy_password}@mongodb:27017/quizzy-gen?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - quizzy-net

  # Frontend service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: quizzy-gen-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - quizzy-net

# Volumes
volumes:
  mongodb_data:
    driver: local

# Networks
networks:
  quizzy-net:
    driver: bridge 